name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend · Java 21
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: mall-backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
          cache-dependency-path: mall-backend/pom.xml

      - name: Test backend
        run: mvn --batch-mode --no-transfer-progress verify

      - name: Upload JaCoCo report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v5
        with:
          name: jacoco-report
          path: mall-backend/target/site/jacoco/
          retention-days: 14

  frontend:
    name: ${{ matrix.app }} · Node 22
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        app:
          - emall-client
          - emall-admin
    defaults:
      run:
        working-directory: ${{ matrix.app }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: ${{ matrix.app }}/package-lock.json

      - name: Install locked dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

      - name: Build frontend
        run: npm run build

  e2e:
    name: End-to-end · Chromium
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            emall-client/package-lock.json
            emall-admin/package-lock.json

      - name: Install locked dependencies
        run: |
          npm ci
          npm ci --prefix emall-client
          npm ci --prefix emall-admin

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run browser smoke tests
        run: npm run test:e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v5
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
