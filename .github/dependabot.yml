version: 2
updates:
  - package-ecosystem: maven
    directory: /mall-backend
    schedule:
      interval: weekly
      day: monday
      time: "02:00"
      timezone: Asia/Shanghai
    open-pull-requests-limit: 5
    groups:
      maven-minor-and-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: npm
    directory: /emall-client
    schedule:
      interval: weekly
      day: monday
      time: "02:15"
      timezone: Asia/Shanghai
    open-pull-requests-limit: 5
    groups:
      client-minor-and-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: npm
    directory: /emall-admin
    schedule:
      interval: weekly
      day: monday
      time: "02:30"
      timezone: Asia/Shanghai
    open-pull-requests-limit: 5
    groups:
      admin-minor-and-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "02:45"
      timezone: Asia/Shanghai
    open-pull-requests-limit: 5
    groups:
      actions-minor-and-patch:
        update-types:
          - minor
          - patch
