version: '3.8'
services:
  mysql:
    image: mysql:8.0
    container_name: emall-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: emall_db
    ports:
      - "3307:3306"
    volumes:
      - ./mysql-data:/var/lib/mysql
      - ./数据库mysqldump文件/emall_docker-2026_06_01_23_36_33-dump.sql:/docker-entrypoint-initdb.d/init.sql

  redis:
    image: redis:7.0-alpine
    container_name: emall-redis
    ports:
      - "6379:6379"

  backend:
    build: .
    container_name: emall-backend
    ports:
      - "8080:8080"
    depends_on:
      - mysql
      - redis
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/emall_db?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
      - SPRING_DATA_REDIS_HOST=redis
    volumes:
          - D:/emall_data/photo:/uploads  # 确保 D:/emall_data/photo 是你电脑真实的路径
          # ------------------